# Bắp Number Adventure — Docker Compose
# Dev:  docker compose up
# Prod: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-bap_adventure}
      POSTGRES_USER: ${POSTGRES_USER:-bap}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-bap} -d ${POSTGRES_DB:-bap_adventure}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  migrate:
    # One-shot: runs `prisma migrate deploy` then exits (no restart)
    build:
      context: .
      dockerfile: Dockerfile
      target: builder
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-bap}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-bap_adventure}
    depends_on:
      db:
        condition: service_healthy
    command: npx prisma migrate deploy
    restart: "no"

  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-bap}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-bap_adventure}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

volumes:
  postgres_data:
    name: bap_postgres_data
