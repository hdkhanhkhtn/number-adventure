version: '3.8'
services:
  db:
    image: postgres:16-alpine
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: bap
      POSTGRES_PASSWORD: bap_dev_pass
      POSTGRES_DB: bap_number_adventure
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U bap -d bap_number_adventure']
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    ports:
      - '3000:3000'
    environment:
      DATABASE_URL: postgresql://bap:bap_dev_pass@db:5432/bap_number_adventure
      AI_ENDPOINT: https://9router.remotestaff.vn/v1
      AI_MODEL: advance-model
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
