events { worker_connections 1024; }

http {
  upstream nextapp {
    server app:3000;
    keepalive 32;
  }

  server {
    listen 80;
    server_name _;
    server_tokens off;

    # Security headers
    add_header X-Content-Type-Options  "nosniff"                        always;
    add_header X-Frame-Options         "DENY"                           always;
    add_header Referrer-Policy         "strict-origin-when-cross-origin" always;
    add_header X-XSS-Protection        "1; mode=block"                  always;
    add_header Content-Security-Policy "worker-src 'self'"              always;

    # Max upload size for any future file features
    client_max_body_size 10M;

    location / {
      proxy_pass         http://nextapp;
      proxy_http_version 1.1;
      proxy_set_header   Upgrade           $http_upgrade;
      proxy_set_header   Connection        'upgrade';
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
      proxy_cache_bypass $http_upgrade;
      proxy_read_timeout 300s;
      proxy_connect_timeout 75s;
    }

    # Health check endpoint (used by docker healthcheck / CI)
    location /api/health {
      proxy_pass http://nextapp;
      access_log off;
    }

    # Service Worker — must be served from root scope with correct headers
    location = /sw.js {
      proxy_pass http://nextapp;
      add_header Service-Worker-Allowed /;
      add_header Cache-Control "no-cache, no-store, must-revalidate";
      add_header Content-Type "application/javascript; charset=utf-8";
    }

    # Web App Manifest
    location = /manifest.json {
      proxy_pass http://nextapp;
      add_header Cache-Control "public, max-age=86400";
    }
  }
}
