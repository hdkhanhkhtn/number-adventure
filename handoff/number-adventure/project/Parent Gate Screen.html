<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Parent Gate — Bắp Number Adventure</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Be+Vietnam+Pro:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="tokens.css"/>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
  html, body { margin: 0; padding: 0; background: #D9CFC0; min-height: 100vh; display: flex; align-items: center; justify-content: center; font-family: var(--font-parent); }
  * { box-sizing: border-box; }

  @keyframes pop-in   { 0%{transform:scale(0.5);opacity:0} 65%{transform:scale(1.06)} 100%{transform:scale(1);opacity:1} }
  @keyframes bobble   { 0%,100%{transform:translateY(0) rotate(0)} 50%{transform:translateY(-7px) rotate(-2deg)} }
  @keyframes slide-up { from{transform:translateY(20px);opacity:0} to{transform:translateY(0);opacity:1} }
  @keyframes wiggle-h { 0%,100%{transform:translateX(0)} 20%{transform:translateX(-8px)} 40%{transform:translateX(8px)} 60%{transform:translateX(-6px)} 80%{transform:translateX(6px)} }
  @keyframes ring-glow { 0%,100%{filter:drop-shadow(0 0 4px rgba(168,213,162,0.4))} 50%{filter:drop-shadow(0 0 12px rgba(95,179,106,0.7))} }
  @keyframes unlock-burst { 0%{transform:scale(1);opacity:1} 60%{transform:scale(1.18);opacity:0.8} 100%{transform:scale(1);opacity:1} }
  @keyframes fade-in  { from{opacity:0} to{opacity:1} }
  @keyframes float-leaf { 0%,100%{transform:translateY(0) rotate(-4deg)} 50%{transform:translateY(-10px) rotate(4deg)} }
  @keyframes tick-in  { 0%{stroke-dashoffset:60;opacity:0} 100%{stroke-dashoffset:0;opacity:1} }

  .bobble { animation: bobble 2.8s ease-in-out infinite; }
  .no-select { user-select: none; -webkit-user-select: none; -webkit-tap-highlight-color: transparent; }
</style>
</head>
<body>
<script type="text/babel" src="mascot.jsx"></script>
<script type="text/babel">

const MATH_POOL = [
  { q: 'What is 8 + 7?',  a: 15 },
  { q: 'What is 13 − 5?', a: 8  },
  { q: 'What is 6 + 9?',  a: 15 },
  { q: 'What is 17 − 8?', a: 9  },
  { q: 'What is 7 + 6?',  a: 13 },
  { q: 'What is 14 − 6?', a: 8  },
  { q: 'What is 9 + 5?',  a: 14 },
  { q: 'What is 11 − 4?', a: 7  },
];

// ── Tiny mascot inline (head only) – reuses BapMascot from mascot.jsx
function MascotThink({ size = 100 }) {
  return <BapMascot size={size} mood="think" color="sun"/>;
}
function MascotCelebrate({ size = 100 }) {
  return <BapMascot size={size} mood="celebrate" color="sun"/>;
}

// ── SVG progress ring
function HoldRing({ progress = 0, size = 160, stroke = 10 }) {
  const r = (size - stroke * 2) / 2;
  const circ = 2 * Math.PI * r;
  const offset = circ * (1 - progress);
  return (
    <svg width={size} height={size} style={{ position:'absolute', top:0, left:0, transform:'rotate(-90deg)' }}>
      {/* track */}
      <circle cx={size/2} cy={size/2} r={r} fill="none"
        stroke="rgba(46,90,58,0.1)" strokeWidth={stroke}/>
      {/* fill */}
      <circle cx={size/2} cy={size/2} r={r} fill="none"
        stroke={progress >= 1 ? '#5FB36A' : '#A8D5A2'}
        strokeWidth={stroke}
        strokeLinecap="round"
        strokeDasharray={circ}
        strokeDashoffset={offset}
        style={{ transition: 'stroke 0.2s', animation: progress > 0 && progress < 1 ? 'ring-glow 1s ease-in-out infinite' : 'none' }}
      />
    </svg>
  );
}

// ── Decorative floating leaves (bg)
function BgLeaves() {
  const leaves = [
    { x: '8%',  y: '12%', rot: -20, size: 28, delay: 0 },
    { x: '88%', y: '8%',  rot:  30, size: 22, delay: 0.6 },
    { x: '5%',  y: '72%', rot:  15, size: 20, delay: 1.1 },
    { x: '90%', y: '68%', rot: -25, size: 26, delay: 0.3 },
    { x: '50%', y: '5%',  rot:  10, size: 18, delay: 0.9 },
  ];
  return (
    <>
      {leaves.map((l, i) => (
        <div key={i} style={{
          position:'absolute', left:l.x, top:l.y,
          animation: `float-leaf ${3+i*0.4}s ease-in-out ${l.delay}s infinite`,
          opacity: 0.35, pointerEvents:'none',
        }}>
          <svg width={l.size} height={l.size} viewBox="0 0 24 24">
            <ellipse cx="12" cy="12" rx="10" ry="6" fill="#7FB983"
              transform={`rotate(${l.rot} 12 12)`}/>
            <path d="M12 6 Q14 12 12 18" stroke="#5FA36A" strokeWidth="1.2" fill="none"/>
          </svg>
        </div>
      ))}
    </>
  );
}

// ── Check mark animation
function CheckMark() {
  return (
    <svg width="52" height="52" viewBox="0 0 52 52" style={{ animation:'pop-in 0.45s cubic-bezier(0.34,1.56,0.64,1) both' }}>
      <circle cx="26" cy="26" r="24" fill="#5FB36A" stroke="#2D3A2E" strokeWidth="3"/>
      <polyline points="14,27 23,36 38,18" fill="none" stroke="#fff" strokeWidth="4"
        strokeLinecap="round" strokeLinejoin="round"
        style={{ strokeDasharray:60, strokeDashoffset:0, animation:'tick-in 0.4s ease-out 0.2s both' }}/>
    </svg>
  );
}

// ── Main Parent Gate App
function ParentGate() {
  const [screen, setScreen] = React.useState('gate'); // gate | math | unlocked
  const [phase,  setPhase]  = React.useState('idle'); // idle | holding | done | wrong
  const [progress, setProgress] = React.useState(0);
  const [mathQ, setMathQ] = React.useState(() => MATH_POOL[Math.floor(Math.random()*MATH_POOL.length)]);
  const [mathInput, setMathInput] = React.useState('');
  const [mathWrong, setMathWrong] = React.useState(false);
  const [mathAttempts, setMathAttempts] = React.useState(0);

  const holdRef = React.useRef(null);
  const startRef = React.useRef(null);
  const rafRef = React.useRef(null);

  const HOLD_MS = 3000;

  function startHold() {
    if (phase !== 'idle') return;
    setPhase('holding');
    startRef.current = performance.now();
    function tick(now) {
      const elapsed = now - startRef.current;
      const p = Math.min(elapsed / HOLD_MS, 1);
      setProgress(p);
      if (p < 1) {
        rafRef.current = requestAnimationFrame(tick);
      } else {
        setPhase('done');
        setTimeout(() => setScreen('unlocked'), 500);
      }
    }
    rafRef.current = requestAnimationFrame(tick);
  }

  function endHold() {
    if (phase === 'done') return;
    cancelAnimationFrame(rafRef.current);
    setPhase('idle');
    setProgress(0);
  }

  function submitMath() {
    if (parseInt(mathInput, 10) === mathQ.a) {
      setScreen('unlocked');
    } else {
      setMathWrong(true);
      setMathAttempts(a => a + 1);
      setMathInput('');
      setTimeout(() => setMathWrong(false), 700);
      if (mathAttempts >= 1) {
        // new question after 2 wrong
        setMathQ(MATH_POOL[Math.floor(Math.random()*MATH_POOL.length)]);
        setMathAttempts(0);
      }
    }
  }

  function openMath() {
    setMathInput('');
    setMathWrong(false);
    setMathAttempts(0);
    setMathQ(MATH_POOL[Math.floor(Math.random()*MATH_POOL.length)]);
    setScreen('math');
  }

  function goBack() {
    cancelAnimationFrame(rafRef.current);
    setPhase('idle');
    setProgress(0);
    setScreen('gate');
  }

  // ── UNLOCKED state
  if (screen === 'unlocked') {
    return (
      <PhoneShell>
        <div style={{
          height:'100%', display:'flex', flexDirection:'column',
          alignItems:'center', justifyContent:'center', gap:20,
          padding:'40px 28px',
          background:'linear-gradient(170deg, #EDF7EC 0%, #FFF8EC 100%)',
          animation:'fade-in 0.3s ease',
        }}>
          <CheckMark/>
          <div style={{
            background:'#EDF7EC', borderRadius:12, padding:'4px 16px',
            border:'1.5px solid #B0D9A8',
            fontSize:11, fontWeight:700, color:'#2F6A3C', letterSpacing:1,
            fontFamily:'var(--font-parent)',
          }}>PARENT CORNER</div>
          <div style={{ fontSize:26, fontWeight:700, color:'#1F2A1F', textAlign:'center', fontFamily:'var(--font-parent)', lineHeight:1.25 }}>
            Welcome, grown-up! 👋
          </div>
          <div style={{ fontSize:14, color:'#6B7A6C', textAlign:'center', fontFamily:'var(--font-parent)', lineHeight:1.5 }}>
            You're now in parent mode.<br/>Your little one can't get here by accident.
          </div>
          {/* Simulated dashboard entry */}
          <div style={{
            marginTop:8, width:'100%', background:'#fff', borderRadius:20,
            border:'1px solid rgba(0,0,0,0.06)', boxShadow:'0 2px 12px rgba(0,0,0,0.05)',
            overflow:'hidden',
          }}>
            {[
              { icon:'📊', label:'Progress Report',   sub:'View this week\'s activity' },
              { icon:'⏱️', label:'Time Limits',        sub:'15 minutes / day' },
              { icon:'⚙️', label:'Settings',           sub:'Profile, language, audio' },
            ].map((row, i, arr) => (
              <div key={i} style={{
                display:'flex', alignItems:'center', gap:12,
                padding:'14px 16px',
                borderBottom: i < arr.length-1 ? '1px solid rgba(0,0,0,0.06)' : 'none',
                fontFamily:'var(--font-parent)',
              }}>
                <div style={{ fontSize:22, width:32, textAlign:'center' }}>{row.icon}</div>
                <div style={{ flex:1 }}>
                  <div style={{ fontSize:14, fontWeight:600, color:'#1F2A1F' }}>{row.label}</div>
                  <div style={{ fontSize:12, color:'#6B7A6C' }}>{row.sub}</div>
                </div>
                <div style={{ fontSize:18, color:'#C4C0B3' }}>›</div>
              </div>
            ))}
          </div>
          <button onClick={goBack} style={{
            marginTop:4, fontSize:13, color:'#9AA69A', background:'none', border:'none',
            cursor:'pointer', fontFamily:'var(--font-parent)', fontWeight:600,
          }}>← Back to child mode</button>
        </div>
      </PhoneShell>
    );
  }

  // ── MATH CHALLENGE state
  if (screen === 'math') {
    const digits = ['1','2','3','4','5','6','7','8','9','⌫','0','✓'];
    return (
      <PhoneShell>
        <div style={{
          height:'100%', display:'flex', flexDirection:'column',
          background:'#F5F3ED', fontFamily:'var(--font-parent)',
        }}>
          {/* Header */}
          <div style={{
            padding:'52px 20px 14px', background:'#fff',
            borderBottom:'1px solid rgba(0,0,0,0.06)',
            display:'flex', alignItems:'center', gap:12,
          }}>
            <button onClick={goBack} style={{
              width:40, height:40, borderRadius:14,
              background:'#F0EADC', border:'none', cursor:'pointer',
              fontSize:20, display:'flex', alignItems:'center', justifyContent:'center',
              color:'#2D3A2E', fontWeight:700,
            }}>‹</button>
            <div>
              <div style={{ fontSize:11, fontWeight:700, color:'#6B7A6C', letterSpacing:0.8 }}>PARENT CORNER</div>
              <div style={{ fontSize:17, fontWeight:700, color:'#1F2A1F' }}>Quick check</div>
            </div>
          </div>

          {/* Question area */}
          <div style={{
            flex:1, display:'flex', flexDirection:'column',
            alignItems:'center', justifyContent:'center',
            padding:'0 28px', gap:20,
          }}>
            <div style={{ fontSize:13, color:'#6B7A6C', textAlign:'center', lineHeight:1.5 }}>
              Just to make sure you're a grown-up 🙂
            </div>
            <div style={{
              background:'#fff', borderRadius:22,
              border:'3px solid #2D3A2E',
              boxShadow:'0 5px 0 rgba(46,90,58,0.15)',
              padding:'20px 28px', textAlign:'center', width:'100%',
            }}>
              <div style={{ fontSize:13, color:'#6B7A6C', fontWeight:600, marginBottom:8 }}>SOLVE THIS</div>
              <div style={{ fontSize:30, fontWeight:700, color:'#1F2A1F', letterSpacing:-0.5 }}>{mathQ.q}</div>
            </div>

            {/* Answer display */}
            <div style={{
              width:'100%', height:62, borderRadius:16,
              border: mathWrong ? '3px solid #E88866' : '3px solid #2D3A2E',
              background: mathWrong ? '#FFF0EA' : '#fff',
              display:'flex', alignItems:'center', justifyContent:'center',
              fontSize:30, fontWeight:700, color: mathWrong ? '#C14A2A' : '#1F2A1F',
              animation: mathWrong ? 'wiggle-h 0.5s ease-in-out' : 'none',
              transition:'border-color 0.2s, background 0.2s',
              letterSpacing:2,
            }}>
              {mathInput || <span style={{ color:'#C4C0B3', fontSize:22 }}>your answer</span>}
            </div>
          </div>

          {/* Numpad */}
          <div style={{
            padding:'12px 20px 32px',
            display:'grid', gridTemplateColumns:'repeat(3, 1fr)', gap:10,
          }}>
            {digits.map((d, i) => {
              const isCheck = d === '✓';
              const isDel   = d === '⌫';
              return (
                <button key={i}
                  onClick={() => {
                    if (d === '⌫') { setMathInput(s => s.slice(0,-1)); return; }
                    if (d === '✓') { submitMath(); return; }
                    if (mathInput.length < 3) setMathInput(s => s + d);
                  }}
                  style={{
                    height:58, borderRadius:16, border:'none', cursor:'pointer',
                    fontSize: isCheck ? 26 : isDel ? 22 : 24,
                    fontWeight:700, fontFamily:'var(--font-parent)',
                    background: isCheck ? '#5FB36A' : isDel ? '#F0EADC' : '#fff',
                    color: isCheck ? '#fff' : '#1F2A1F',
                    boxShadow: isCheck
                      ? '0 4px 0 #4D8B58, 0 6px 16px rgba(95,179,106,0.2)'
                      : '0 2px 0 rgba(46,90,58,0.1)',
                    border: isCheck ? '2px solid #2D3A2E' : '1.5px solid rgba(0,0,0,0.08)',
                    transition:'transform 0.1s',
                  }}
                  onMouseDown={e => { e.currentTarget.style.transform='translateY(3px)'; }}
                  onMouseUp={e => { e.currentTarget.style.transform=''; }}
                  onMouseLeave={e => { e.currentTarget.style.transform=''; }}
                >{d}</button>
              );
            })}
          </div>
        </div>
      </PhoneShell>
    );
  }

  // ── GATE (default) state
  const isHolding = phase === 'holding';
  const isDone    = phase === 'done';

  const btnBg    = isDone ? '#5FB36A' : isHolding ? '#C4EBB9' : '#FFF8EC';
  const btnShad  = isDone ? '#4D8B58' : isHolding ? '#88C88E' : '#D9C38A';
  const btnBord  = '#2D3A2E';

  return (
    <PhoneShell>
      <div style={{
        height:'100%', display:'flex', flexDirection:'column',
        background: 'linear-gradient(175deg, #FFF8EC 0%, #FFEFD3 55%, #F0E8D5 100%)',
        position:'relative', overflow:'hidden',
      }}>
        <BgLeaves/>

        {/* Top bar */}
        <div style={{
          padding:'52px 20px 0', display:'flex', alignItems:'center',
          justifyContent:'space-between', position:'relative', zIndex:1,
        }}>
          <button onClick={() => {}} style={{
            width:40, height:40, borderRadius:14,
            background:'rgba(255,255,255,0.7)', backdropFilter:'blur(4px)',
            border:'1.5px solid rgba(46,90,58,0.15)',
            cursor:'pointer', fontSize:20,
            display:'flex', alignItems:'center', justifyContent:'center',
            color:'#2D3A2E', fontWeight:700, fontFamily:'var(--font-parent)',
          }}>‹</button>

          {/* Parent badge */}
          <div style={{
            display:'flex', alignItems:'center', gap:6,
            background:'rgba(255,255,255,0.75)', backdropFilter:'blur(6px)',
            border:'1.5px solid rgba(168,213,162,0.6)',
            borderRadius:999, padding:'5px 12px',
          }}>
            <span style={{ fontSize:14 }}>🌿</span>
            <span style={{ fontSize:11, fontWeight:700, color:'#2F6A3C', letterSpacing:0.8, fontFamily:'var(--font-parent)' }}>
              PARENT CORNER
            </span>
          </div>

          <div style={{ width:40 }}/>
        </div>

        {/* Main content */}
        <div style={{
          flex:1, display:'flex', flexDirection:'column',
          alignItems:'center', justifyContent:'center',
          padding:'0 28px', gap:0, position:'relative', zIndex:1,
        }}>
          {/* Mascot */}
          <div className="bobble" style={{ marginBottom:12 }}>
            <BapMascot size={110} mood={isDone ? 'celebrate' : 'think'} color="sun"/>
          </div>

          {/* Heading */}
          <div style={{
            fontSize:24, fontWeight:700, color:'#1F2A1F',
            textAlign:'center', fontFamily:'var(--font-parent)',
            lineHeight:1.25, marginBottom:6,
            animation:'slide-up 0.4s ease both',
          }}>
            Hi there, grown-up!
          </div>
          <div style={{
            fontSize:14, color:'#6B7A6C', textAlign:'center',
            fontFamily:'var(--font-parent)', lineHeight:1.55,
            maxWidth:240, marginBottom:32,
            animation:'slide-up 0.4s ease 0.1s both',
          }}>
            This area is just for parents.<br/>
            Hold the button below to continue.
          </div>

          {/* Hold button */}
          <div style={{ position:'relative', width:160, height:160, animation:'slide-up 0.4s ease 0.2s both' }}>
            <HoldRing progress={isDone ? 1 : progress} size={160} stroke={10}/>

            {/* Button circle */}
            <div
              className="no-select"
              onMouseDown={startHold}
              onMouseUp={endHold}
              onMouseLeave={endHold}
              onTouchStart={e => { e.preventDefault(); startHold(); }}
              onTouchEnd={endHold}
              onTouchCancel={endHold}
              style={{
                position:'absolute', inset:10,
                borderRadius:'50%',
                background: btnBg,
                border:`3.5px solid ${btnBord}`,
                boxShadow:`0 6px 0 ${btnShad}, 0 14px 28px rgba(46,90,58,0.12)`,
                display:'flex', flexDirection:'column',
                alignItems:'center', justifyContent:'center', gap:6,
                cursor: isDone ? 'default' : 'pointer',
                transition:'background 0.25s, box-shadow 0.25s',
                animation: isDone ? 'unlock-burst 0.5s ease' : 'none',
                userSelect:'none',
              }}
            >
              {isDone ? (
                <CheckMark/>
              ) : (
                <>
                  <span style={{ fontSize:32, lineHeight:1, pointerEvents:'none' }}>🔓</span>
                  <span style={{
                    fontSize:11, fontWeight:700, color: isHolding ? '#2F6A3C' : '#6B7A6C',
                    fontFamily:'var(--font-parent)', letterSpacing:0.5,
                    lineHeight:1, pointerEvents:'none', transition:'color 0.2s',
                  }}>
                    {isHolding ? 'Hold…' : 'HOLD'}
                  </span>
                </>
              )}
            </div>
          </div>

          {/* Timer hint */}
          <div style={{
            marginTop:14, fontSize:12, color:'#A9B4A8',
            fontFamily:'var(--font-parent)', fontWeight:500,
            transition:'opacity 0.2s', opacity: isHolding ? 1 : 0.6,
          }}>
            {isHolding
              ? `${Math.ceil((1 - progress) * 3)}s remaining…`
              : 'Press and hold for 3 seconds'}
          </div>
        </div>

        {/* Bottom: math alternative + cancel */}
        <div style={{
          padding:'0 28px 40px',
          display:'flex', flexDirection:'column',
          alignItems:'center', gap:14, position:'relative', zIndex:1,
        }}>
          <button onClick={openMath} style={{
            background:'none', border:'none', cursor:'pointer',
            fontSize:13, color:'#2E6F93', fontWeight:600,
            fontFamily:'var(--font-parent)',
            textDecoration:'underline', textDecorationColor:'rgba(46,111,147,0.35)',
            padding:'4px 0',
          }}>
            Use a math question instead
          </button>
          <button onClick={() => {}} style={{
            background:'none', border:'none', cursor:'pointer',
            fontSize:13, color:'#A9B4A8', fontWeight:500,
            fontFamily:'var(--font-parent)',
          }}>
            Cancel
          </button>
        </div>
      </div>
    </PhoneShell>
  );
}

// ── Phone shell (portrait, ~390×844)
function PhoneShell({ children }) {
  return (
    <div style={{
      width: 390, height: 844,
      borderRadius: 50,
      overflow: 'hidden',
      boxShadow: '0 0 0 10px #1a1a1a, 0 40px 80px rgba(0,0,0,0.4), inset 0 0 0 1px rgba(255,255,255,0.08)',
      position: 'relative',
      background: '#000',
    }}>
      {/* Notch */}
      <div style={{
        position:'absolute', top:0, left:'50%', transform:'translateX(-50%)',
        width:120, height:34, background:'#000',
        borderRadius:'0 0 20px 20px', zIndex:100,
      }}/>
      <div style={{ position:'absolute', inset:0, overflow:'hidden', borderRadius:50 }}>
        {children}
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<ParentGate/>);
</script>
<div id="root"></div>
</body>
</html>
