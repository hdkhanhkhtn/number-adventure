<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Bắp — Daily Progress & Streak Screen</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Be+Vietnam+Pro:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; font-family: 'Fredoka', ui-rounded, sans-serif; background: #E8E0D3; -webkit-font-smoothing: antialiased; overflow: hidden; }
button { cursor: pointer; font-family: inherit; border: none; background: none; }
@keyframes bobble      { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-7px)} }
@keyframes pop-in      { 0%{transform:scale(.55);opacity:0} 65%{transform:scale(1.1);opacity:1} 100%{transform:scale(1)} }
@keyframes pulse-soft  { 0%,100%{transform:scale(1)} 50%{transform:scale(1.05)} }
@keyframes sparkle     { 0%,100%{transform:scale(.6) rotate(0);opacity:.3} 50%{transform:scale(1.4) rotate(180deg);opacity:1} }
@keyframes confetti-fall{ 0%{transform:translateY(-14px) rotate(0);opacity:1} 100%{transform:translateY(140px) rotate(540deg);opacity:0} }
@keyframes fire-flicker{ 0%,100%{transform:scale(1) rotate(-2deg)} 50%{transform:scale(1.08) rotate(2deg)} }
@keyframes star-in     { 0%{transform:scale(0) rotate(-20deg);opacity:0} 65%{transform:scale(1.2);opacity:1} 100%{transform:scale(1)} }
@keyframes slide-up    { from{transform:translateY(18px);opacity:0} to{transform:translateY(0);opacity:1} }
@keyframes float-up    { from{transform:translateY(0);opacity:1} to{transform:translateY(-50px);opacity:0} }
@keyframes fill-bar    { from{width:0%} to{width:var(--w)} }
@keyframes day-pop     { 0%{transform:scale(.7);opacity:0} 60%{transform:scale(1.15)} 100%{transform:scale(1)} }
@keyframes gentle-sway { 0%,100%{transform:rotate(-3deg)} 50%{transform:rotate(3deg)} }
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel">
const { useState, useMemo } = React;

const C = {
  ink:'#2D3A2E',soft:'#6B7A6C',faint:'#A9B4A8',
  sun:'#FFD36E', sunSh:'#C79528', sunInk:'#5E3A00',
  sage:'#7FC089',sageSh:'#4D8B58',sageInk:'#1F4A28',sagePale:'#C4EBB9',sageBg:'#EAF7E4',
  sky:'#8AC4DE', skySh:'#5A96B1', skyInk:'#1F4A61', skyBg:'#E4F2FA',
  lav:'#D9C7F0', lavSh:'#A58AD0', lavInk:'#3D256D',
  coral:'#FFA48C',coralSh:'#D67560',coralInk:'#7A2B15',
  cream:'#FFF8EC',surface:'#FFFDF7',
  correct:'#5FB36A',correctSh:'#3D8A4A',correctBg:'#EAF7E4',
  fire:'#FF6B2B',  fireSh:'#C84A15',
  miss:'#E8DFCE',  missInk:'#A9B4A8',
};

// ─── MASCOT ──────────────────────────────────────────────────
function Bap({size=80,mood='happy',color='sun'}) {
  const body={sun:'#FFD36E',sage:'#A8D5A2',coral:'#FFA48C',lavender:'#D9C7F0',sky:'#B8DEEF'}[color]||'#FFD36E';
  const dark={sun:'#E8B23F',sage:'#7FB983',coral:'#E2815E',lavender:'#B39DD1',sky:'#88BED4'}[color]||'#E8B23F';
  const eye={
    happy:<><ellipse cx="0" cy="0" rx="6" ry="7" fill={C.ink}/><ellipse cx="-1.5" cy="-2" rx="2" ry="2.5" fill="#fff"/></>,
    celebrate:<path d="M -6 2 Q 0 -6 6 2" stroke={C.ink} strokeWidth="3" fill="none" strokeLinecap="round"/>,
    sleep:<path d="M -6 0 Q 0 4 6 0" stroke={C.ink} strokeWidth="3" fill="none" strokeLinecap="round"/>,
    sad:<><ellipse cx="0" cy="1" rx="5" ry="5" fill={C.ink}/></>,
    excited:<><ellipse cx="0" cy="0" rx="7" ry="8" fill={C.ink}/><ellipse cx="-2" cy="-2.5" rx="2.5" ry="3" fill="#fff"/></>,
    wink:<path d="M -6 0 Q 0 -4 6 0" stroke={C.ink} strokeWidth="3" fill="none" strokeLinecap="round"/>,
  };
  const mouth={
    happy:<path d="M 35 85 Q 50 98 65 85" stroke={C.ink} strokeWidth="3.5" fill="#C14A2A" strokeLinecap="round"/>,
    celebrate:<path d="M 30 80 Q 50 108 70 80 Q 50 97 30 80" fill="#C14A2A" stroke={C.ink} strokeWidth="3"/>,
    sleep:<path d="M 42 88 Q 50 92 58 88" stroke={C.ink} strokeWidth="3" fill="none" strokeLinecap="round"/>,
    sad:<path d="M 38 91 Q 50 83 62 91" stroke={C.ink} strokeWidth="3" fill="none" strokeLinecap="round"/>,
    excited:<path d="M 28 80 Q 50 112 72 80 Q 50 99 28 80" fill="#C14A2A" stroke={C.ink} strokeWidth="3.5"/>,
    wink:<path d="M 40 85 Q 50 92 60 85" stroke={C.ink} strokeWidth="3.5" fill="#C14A2A" strokeLinecap="round"/>,
  };
  return (
    <svg viewBox="0 0 120 140" width={size} height={size*140/120} style={{display:'block'}}>
      <g><ellipse cx="38" cy="18" rx="14" ry="20" fill="#7FB983" transform="rotate(-30 38 18)"/>
      <ellipse cx="38" cy="18" rx="7" ry="16" fill="#A8D5A2" transform="rotate(-30 38 18)"/>
      <ellipse cx="76" cy="14" rx="16" ry="22" fill="#5FA36A" transform="rotate(25 76 14)"/>
      <ellipse cx="76" cy="14" rx="8" ry="18" fill="#A8D5A2" transform="rotate(25 76 14)"/></g>
      <ellipse cx="60" cy="126" rx="38" ry="6" fill="rgba(46,90,58,0.15)"/>
      <path d="M60 28 C92 28 100 56 100 82 C100 110 82 126 60 126 C38 126 20 110 20 82 C20 56 28 28 60 28Z" fill={body} stroke={C.ink} strokeWidth="3.5"/>
      <g opacity=".3" stroke={dark} strokeWidth="2" fill="none" strokeLinecap="round">
        <path d="M30 62 Q60 56 90 62"/><path d="M28 80 Q60 74 92 80"/><path d="M30 98 Q60 104 90 98"/>
      </g>
      <circle cx="30" cy="82" r="7" fill="#FFA48C" opacity=".7"/><circle cx="90" cy="82" r="7" fill="#FFA48C" opacity=".7"/>
      <g transform="translate(42 66)">{eye[mood]||eye.happy}</g><g transform="translate(78 66)">{eye[mood]||eye.happy}</g>
      {mouth[mood]||mouth.happy}
    </svg>
  );
}

function Sparkle({x,y,s=10,d=0,color='#FFD36E'}) {
  return <div style={{position:'absolute',left:x,top:y,width:s,height:s,pointerEvents:'none',animation:`sparkle ${1.8+d}s ease-in-out ${d}s infinite`,color}}><svg viewBox="0 0 20 20" width="100%" height="100%"><path d="M10 0L12 8 20 10 12 12 10 20 8 12 0 10 8 8Z" fill="currentColor"/></svg></div>;
}
function Confetti({count=20}) {
  const p=useMemo(()=>Array.from({length:count},(_,i)=>({left:Math.random()*100,color:['#FFD36E','#FFA48C','#A8D5A2','#B8DEEF','#D9C7F0','#E6779E'][i%6],size:6+Math.random()*7,dur:1.3+Math.random()*1.2,delay:Math.random()*.6,shape:Math.random()>.5?'50%':'3px'})),[count]);
  return <div style={{position:'absolute',inset:0,pointerEvents:'none',overflow:'hidden'}}>{p.map((x,i)=><div key={i} style={{position:'absolute',left:`${x.left}%`,top:-14,width:x.size,height:x.size,background:x.color,borderRadius:x.shape,animation:`confetti-fall ${x.dur}s ease-in ${x.delay}s forwards`}}/>)}</div>;
}

// ─── WEEK STRIP ───────────────────────────────────────────────
function WeekStrip({ completed=[], today=4, streak=0, size='md' }) {
  const days=['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
  const short=['M','T','W','T','F','S','S'];
  const isSmall = size==='sm';
  return (
    <div style={{display:'flex',gap:isSmall?5:7}}>
      {days.map((d,i)=>{
        const done=completed.includes(i);
        const isToday=i===today;
        const isMiss=i<today&&!done;
        return (
          <div key={i} style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',gap:3}}>
            <div style={{
              width:'100%',paddingBottom:'100%',borderRadius:isSmall?8:12,position:'relative',
              background:done?C.sun:isToday?'rgba(255,255,255,0.6)':isMiss?'rgba(46,90,58,0.06)':'rgba(255,255,255,0.35)',
              border:`${isSmall?1.5:2}px solid ${done?C.sunSh:isToday?C.sun:isMiss?'rgba(46,90,58,0.1)':'rgba(46,90,58,0.12)'}`,
              boxShadow:done?`0 ${isSmall?2:3}px 0 ${C.sunSh}`:isToday?`0 0 0 2px ${C.sun}40`:'none',
              animation:done&&i===today?'day-pop .4s cubic-bezier(.34,1.56,.64,1) both':'none',
            }}>
              {done&&<div style={{position:'absolute',inset:0,display:'flex',alignItems:'center',justifyContent:'center',fontSize:isSmall?12:15}}>⭐</div>}
              {isToday&&!done&&<div style={{position:'absolute',inset:0,display:'flex',alignItems:'center',justifyContent:'center',fontSize:isSmall?12:16,animation:'pulse-soft 1.5s ease-in-out infinite'}}>▶</div>}
              {isMiss&&<div style={{position:'absolute',inset:0,display:'flex',alignItems:'center',justifyContent:'center',fontSize:isSmall?9:11,color:C.faint}}>·</div>}
            </div>
            <div style={{fontSize:isSmall?8:10,fontWeight:700,color:done?C.sunInk:isToday?C.ink:C.faint}}>{short[i]}</div>
          </div>
        );
      })}
    </div>
  );
}

// ─── GOAL BAR ────────────────────────────────────────────────
function GoalBar({ current, goal, color=C.correct }) {
  const pct=Math.min(1,current/goal)*100;
  return (
    <div style={{position:'relative'}}>
      <div style={{height:18,borderRadius:18,background:'rgba(46,90,58,0.1)',border:`2.5px solid ${C.ink}`,overflow:'hidden'}}>
        <div style={{
          height:'100%',
          width:`${pct}%`,
          borderRadius:18,
          background:`linear-gradient(90deg,${color} 0%,${color}cc 100%)`,
          boxShadow:'inset 0 -3px 0 rgba(0,0,0,0.1)',
          transition:'width .7s cubic-bezier(.34,1.56,.64,1)',
        }}/>
      </div>
      {/* Flag at goal */}
      <div style={{position:'absolute',right:0,top:-12,fontSize:18}}>🚩</div>
      {/* Current position indicator */}
      {pct>5&&pct<96&&(
        <div style={{position:'absolute',left:`${pct}%`,top:'50%',transform:'translate(-50%,-50%)',fontSize:14,filter:'drop-shadow(0 1px 0 rgba(46,90,58,0.3))'}}>⭐</div>
      )}
    </div>
  );
}

// ─── STAT CARD ───────────────────────────────────────────────
function StatCard({ icon, value, label, color, bg, anim }) {
  return (
    <div style={{flex:1,padding:'12px 10px',borderRadius:20,background:bg||'rgba(255,255,255,0.75)',border:`2px solid rgba(46,90,58,0.1)`,textAlign:'center',animation:anim}}>
      <div style={{fontSize:26,marginBottom:4}}>{icon}</div>
      <div style={{fontFamily:'Fredoka',fontWeight:700,fontSize:26,color:color||C.ink,lineHeight:1}}>{value}</div>
      <div style={{fontSize:11,color:C.soft,fontWeight:600,marginTop:2}}>{label}</div>
    </div>
  );
}

// ─── LESSON ROW ──────────────────────────────────────────────
function LessonRow({ title, stars, done, active }) {
  return (
    <div style={{
      display:'flex',alignItems:'center',gap:12,padding:'10px 14px',borderRadius:18,
      background:active?'#FFF8EC':done?'rgba(255,255,255,0.7)':'rgba(255,255,255,0.4)',
      border:`${active?'2.5':'1.5'}px solid ${active?C.sun:done?'rgba(46,90,58,0.1)':'rgba(46,90,58,0.06)'}`,
      boxShadow:active?`0 3px 0 ${C.sunSh}`:done?'0 2px 4px rgba(46,90,58,0.06)':'none',
      animation:active?'pulse-soft 2s ease-in-out infinite':'none',
    }}>
      <div style={{width:36,height:36,borderRadius:12,background:done?C.correct:active?C.sun:'rgba(46,90,58,0.08)',border:`2.5px solid ${C.ink}`,boxShadow:done?`0 3px 0 ${C.correctSh}`:active?`0 3px 0 ${C.sunSh}`:'none',display:'flex',alignItems:'center',justifyContent:'center',fontSize:17,flexShrink:0}}>
        {done?'✓':active?'▶':'○'}
      </div>
      <div style={{flex:1}}>
        <div style={{fontSize:14,fontWeight:700,color:C.ink}}>{title}</div>
        {done&&<div style={{display:'flex',gap:1,marginTop:2}}>{[0,1,2].map(i=><span key={i} style={{fontSize:12,opacity:i<stars?1:.2}}>{i<stars?'⭐':'☆'}</span>)}</div>}
      </div>
      {active&&<div style={{fontSize:12,fontWeight:700,color:C.sunInk,padding:'4px 10px',borderRadius:999,background:'rgba(255,211,110,0.4)',border:`1px solid ${C.sun}`}}>NOW</div>}
    </div>
  );
}

// ══════════════════════════════════════════════════════════════
// 1 — BEFORE DAILY SESSION
// ══════════════════════════════════════════════════════════════
function BeforeSession() {
  return (
    <div style={{position:'absolute',inset:0,background:'radial-gradient(ellipse 110% 55% at 50% 0%,#FFE6A8 0%,#FFF2CC 40%,#FFF9EE 100%)'}}>
      <Sparkle x="7%"  y="12%" s={11} d={0}/>
      <Sparkle x="85%" y="9%"  s={9}  d={.7}/>
      <div style={{position:'relative',zIndex:1,height:'100%',padding:'52px 20px 24px',display:'flex',flexDirection:'column',gap:14}}>

        {/* Header */}
        <div style={{display:'flex',alignItems:'center',gap:12}}>
          <button style={{width:44,height:44,borderRadius:'50%',background:C.cream,border:`3px solid ${C.ink}`,boxShadow:'0 3px 0 #D9C38A',display:'flex',alignItems:'center',justifyContent:'center',fontSize:20,color:C.soft}}>‹</button>
          <div style={{flex:1}}>
            <div style={{fontFamily:'Fredoka',fontWeight:700,fontSize:20,color:C.ink}}>Today's Adventure</div>
            <div style={{fontSize:12,color:C.soft}}>Thursday · April 24</div>
          </div>
          <div style={{padding:'7px 12px',borderRadius:999,background:'#FFE6A8',border:`2px solid ${C.ink}`,boxShadow:'0 3px 0 #C89220',fontWeight:700,color:C.sunInk,fontSize:15}}>🔥 4</div>
        </div>

        {/* Mascot + greeting */}
        <div style={{background:'linear-gradient(160deg,#B9E2B2 0%,#8FCC8A 100%)',borderRadius:28,border:`3px solid ${C.ink}`,boxShadow:'0 5px 0 rgba(46,90,58,0.25)',padding:'16px 18px',display:'flex',alignItems:'center',gap:14,position:'relative',overflow:'hidden'}}>
          <div style={{position:'absolute',right:-8,bottom:-8,opacity:.15,fontSize:100}}>☀️</div>
          <div style={{animation:'bobble 2.4s ease-in-out infinite',flexShrink:0}}><Bap size={88} mood="excited" color="sun"/></div>
          <div>
            <div style={{fontFamily:'Fredoka',fontWeight:700,fontSize:20,color:'#1F4A28',lineHeight:1.1,marginBottom:4}}>Good morning!<br/>Ready to play? 🌱</div>
            <div style={{fontSize:12,color:'#2F6A3C',fontWeight:600}}>Daily goal: 15 min · 0 of 3 done</div>
          </div>
        </div>

        {/* Daily goal progress */}
        <div style={{background:'rgba(255,255,255,0.8)',borderRadius:22,border:`2px solid rgba(46,90,58,0.12)`,padding:'14px 16px'}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'baseline',marginBottom:10}}>
            <div style={{fontSize:14,fontWeight:700,color:C.ink}}>Today's Goal</div>
            <div style={{fontSize:12,color:C.soft}}>0 / 15 min</div>
          </div>
          <GoalBar current={0} goal={15} color={C.correct}/>
          <div style={{marginTop:10,display:'flex',gap:8}}>
            <StatCard icon="⭐" value="0" label="Stars today" color={C.sunInk}/>
            <StatCard icon="🎮" value="0" label="Levels done" color={C.sageInk}/>
            <StatCard icon="🔥" value="4" label="Day streak" color={C.fire}/>
          </div>
        </div>

        {/* Week strip */}
        <div style={{background:'rgba(255,255,255,0.75)',borderRadius:22,border:`1.5px solid rgba(46,90,58,0.1)`,padding:'14px 16px'}}>
          <div style={{fontSize:12,fontWeight:700,color:C.soft,letterSpacing:.5,marginBottom:10}}>THIS WEEK</div>
          <WeekStrip completed={[0,1,2,3]} today={3} streak={4}/>
        </div>

        {/* Today's lessons */}
        <div style={{background:'rgba(255,255,255,0.75)',borderRadius:22,border:`1.5px solid rgba(46,90,58,0.1)`,padding:'14px 16px'}}>
          <div style={{fontSize:12,fontWeight:700,color:C.soft,letterSpacing:.5,marginBottom:10}}>TODAY'S LESSONS</div>
          <div style={{display:'flex',flexDirection:'column',gap:8}}>
            <LessonRow title="Hear the Number" stars={0} active/>
            <LessonRow title="Build the Number" stars={0}/>
            <LessonRow title="Even or Odd?" stars={0}/>
          </div>
        </div>

        <button style={{width:'100%',height:58,borderRadius:22,background:C.sun,border:`3px solid ${C.ink}`,boxShadow:`0 5px 0 ${C.sunSh}`,fontFamily:'Fredoka',fontWeight:700,fontSize:22,color:C.sunInk,animation:'pulse-soft 2s ease-in-out infinite'}}>
          ▶ Start Today's Adventure!
        </button>
      </div>
    </div>
  );
}

// ══════════════════════════════════════════════════════════════
// 2 — DURING PROGRESS (1 of 3 done)
// ══════════════════════════════════════════════════════════════
function DuringProgress() {
  return (
    <div style={{position:'absolute',inset:0,background:'radial-gradient(ellipse 110% 55% at 50% 0%,#D6ECCE 0%,#E8F4E0 40%,#F4FAEE 100%)'}}>
      <Sparkle x="7%"  y="12%" s={11} d={0}   color="#FFD36E"/>
      <Sparkle x="85%" y="9%"  s={9}  d={.8}  color="#A8D5A2"/>
      <div style={{position:'relative',zIndex:1,height:'100%',padding:'52px 20px 24px',display:'flex',flexDirection:'column',gap:14}}>

        {/* Header */}
        <div style={{display:'flex',alignItems:'center',gap:12}}>
          <button style={{width:44,height:44,borderRadius:'50%',background:C.cream,border:`3px solid ${C.ink}`,boxShadow:'0 3px 0 #D9C38A',display:'flex',alignItems:'center',justifyContent:'center',fontSize:20,color:C.soft}}>‹</button>
          <div style={{flex:1}}>
            <div style={{fontFamily:'Fredoka',fontWeight:700,fontSize:20,color:C.ink}}>Today's Adventure</div>
            <div style={{fontSize:12,color:C.soft}}>Thursday · April 24</div>
          </div>
          <div style={{padding:'7px 12px',borderRadius:999,background:'#FFE6A8',border:`2px solid ${C.ink}`,boxShadow:'0 3px 0 #C89220',fontWeight:700,color:C.sunInk,fontSize:15}}>🔥 4</div>
        </div>

        {/* Progress card */}
        <div style={{background:'linear-gradient(160deg,#A8D5A2 0%,#7FC089 100%)',borderRadius:28,border:`3px solid ${C.ink}`,boxShadow:'0 5px 0 rgba(46,90,58,0.22)',padding:'14px 16px 16px',position:'relative',overflow:'hidden'}}>
          <div style={{position:'absolute',right:-6,bottom:-6,opacity:.15,fontSize:90}}>🌱</div>
          <div style={{fontSize:11,fontWeight:700,color:C.sageInk,letterSpacing:.5,marginBottom:6}}>GREAT START!</div>
          <div style={{fontFamily:'Fredoka',fontWeight:700,fontSize:22,color:'#1F4A28',marginBottom:12}}>Keep going, Bắp! 💪</div>
          <div style={{display:'flex',justifyContent:'space-between',marginBottom:6,fontSize:12,color:C.sageInk,fontWeight:600}}>
            <span>Daily goal</span><span>7 / 15 min</span>
          </div>
          <GoalBar current={7} goal={15} color="#fff"/>
          <div style={{display:'flex',gap:8,marginTop:12}}>
            <StatCard icon="⭐" value="3" label="Stars today" color={C.sunInk} bg="rgba(255,255,255,0.7)" anim="pop-in .4s .1s both"/>
            <StatCard icon="🎮" value="1/3" label="Levels done" color={C.sageInk} bg="rgba(255,255,255,0.7)" anim="pop-in .4s .2s both"/>
            <StatCard icon="⏱️" value="8'" label="Played" color={C.skyInk} bg="rgba(255,255,255,0.7)" anim="pop-in .4s .3s both"/>
          </div>
        </div>

        {/* Week strip */}
        <div style={{background:'rgba(255,255,255,0.75)',borderRadius:22,border:`1.5px solid rgba(46,90,58,0.1)`,padding:'14px 16px'}}>
          <div style={{display:'flex',justifyContent:'space-between',marginBottom:10}}>
            <div style={{fontSize:12,fontWeight:700,color:C.soft,letterSpacing:.5}}>THIS WEEK</div>
            <div style={{fontSize:12,fontWeight:700,color:C.sageInk}}>4 / 5 days ✓</div>
          </div>
          <WeekStrip completed={[0,1,2]} today={3} streak={4}/>
          <div style={{marginTop:8,fontSize:12,color:C.soft,textAlign:'center'}}>⭐ Playing today keeps your 4-day streak!</div>
        </div>

        {/* Today's lessons */}
        <div style={{background:'rgba(255,255,255,0.75)',borderRadius:22,border:`1.5px solid rgba(46,90,58,0.1)`,padding:'14px 16px',flex:1}}>
          <div style={{fontSize:12,fontWeight:700,color:C.soft,letterSpacing:.5,marginBottom:10}}>TODAY'S LESSONS</div>
          <div style={{display:'flex',flexDirection:'column',gap:8}}>
            <LessonRow title="Hear the Number" stars={3} done/>
            <LessonRow title="Build the Number" stars={0} active/>
            <LessonRow title="Even or Odd?" stars={0}/>
          </div>
        </div>

      <div style={{position:'relative',zIndex:1,height:'100%',padding:'52px 20px 24px',display:'flex',flexDirection:'column',gap:14}}>

          <button style={{width:44,height:44,borderRadius:'50%',background:C.cream,border:`3px solid ${C.ink}`,boxShadow:'0 3px 0 #D9C38A',display:'flex',alignItems:'center',justifyContent:'center',fontSize:20,color:C.soft}}>‹</button>

          <div style={{display:'flex',gap:7}}>
            {['M','T','W','T','F','S','S'].map((d,i)=>{
              const done=[0,1,2,3].includes(i);
              const miss=i===4; // Friday missed — today

              return (
                <div key={i} style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',gap:3}}>

                    width:'100%',paddingBottom:'100%',borderRadius:12,position:'relative',

                    border:`2px solid ${done?C.sunSh:miss?'rgba(46,90,58,0.15)':'rgba(46,90,58,0.1)'}`,
                    boxShadow:done?`0 3px 0 ${C.sunSh}`:miss?'none':'none',
                    opacity:miss?.65:1,
                  }}>
                    {done&&<div style={{position:'absolute',inset:0,display:'flex',alignItems:'center',justifyContent:'center',fontSize:15}}>⭐</div>}
                    {miss&&<div style={{position:'absolute',inset:0,display:'flex',alignItems:'center',justifyContent:'center',fontSize:13,color:C.faint}}>−</div>}
                    {today&&<div style={{position:'absolute',inset:0,display:'flex',alignItems:'center',justifyContent:'center',fontSize:16,animation:'pulse-soft 1.5s ease-in-out infinite'}}>▶</div>}
                  </div>
                  <div style={{fontSize:10,fontWeight:700,color:done?C.sunInk:C.faint}}>{d}</div>
                </div>
              );

          <div style={{marginTop:8,padding:'8px 12px',borderRadius:14,background:'rgba(255,255,255,0.6)',border:'1px dashed rgba(46,90,58,0.15)',fontSize:12,color:C.soft,textAlign:'center',lineHeight:1.5}}>

            {icon:'🌱',title:'Fresh start',desc:"Today is a new adventure",color:C.sageBg,border:C.sage,ink:C.sageInk},
            {icon:'💜',title:"That's okay!",desc:"Missing a day is fine",color:C.lav+'22',border:C.lav,ink:C.lavInk},
          ].map(card=>(

          <div style={{display:'flex',flexDirection:'column',gap:8}}>
            <LessonRow title="Hear the Number" stars={0} active/>
            <LessonRow title="Build the Number" stars={0}/>
            <LessonRow title="Number Order" stars={0}/>
          </div>
        </div>

        <button style={{width:'100%',height:58,borderRadius:22,background:C.lav,border:`3px solid ${C.ink}`,boxShadow:`0 5px 0 ${C.lavSh}`,fontFamily:'Fredoka',fontWeight:700,fontSize:21,color:'#fff',animation:'pulse-soft 2s ease-in-out infinite'}}>
          ▶ Start Fresh Today!
        </button>
      </div>
    </div>

}
