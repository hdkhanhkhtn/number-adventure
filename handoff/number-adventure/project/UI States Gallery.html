<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>UI States — Bắp Number Adventure</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&family=Be+Vietnam+Pro:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  background: #BEB5A5;
  min-height: 100vh;
  font-family: 'Be Vietnam Pro', system-ui, sans-serif;
  -webkit-font-smoothing: antialiased;
}
:root {
  --ink: #1F2A1F; --ink-soft: #6B7A6C; --ink-faint: #A9B4A8;
  --surface: #F5F3ED; --card: #FFFFFF;
  --ol: rgba(46,90,58,0.10); --ol-md: rgba(46,90,58,0.18);
  --sage: #5FB36A; --sage-pale: #EDF7EC; --sage-mid: #A8D5A2;
  --sun: #FFD36E; --sun-ink: #7A4E0E; --sun-pale: #FFF8EC;
  --sky: #8AC4DE; --sky-pale: #E4F2FA;
  --lav: #B9A4E0; --lav-pale: #F0EBFA;
  --coral: #FFA48C; --coral-pale: #FFF0EA;
  --cream: #FFF8EC; --parchment: #FDE9C2;
}
button { font-family: inherit; border: none; background: none; cursor: pointer; color: inherit; }

/* Gallery layout */
.gallery-header {
  padding: 32px 28px 20px;
  display: flex; align-items: baseline; gap: 16px;
}
.gallery-title { font-size: 22px; font-weight: 700; color: #3A3228; }
.gallery-sub   { font-size: 13px; color: #8A8070; font-weight: 500; }
.gallery-grid  {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
  gap: 24px; padding: 0 28px 48px;
  max-width: 1100px;
}
.state-card {
  display: flex; flex-direction: column; gap: 10;
  cursor: pointer;
}
.state-card:hover .phone-mini { transform: scale(1.025); box-shadow: 0 0 0 8px #1a1a1a, 0 28px 56px rgba(0,0,0,0.5); }
.phone-mini {
  width: 100%; aspect-ratio: 390/700;
  border-radius: 28px; overflow: hidden;
  box-shadow: 0 0 0 7px #1a1a1a, 0 20px 40px rgba(0,0,0,0.4);
  transition: transform 0.2s ease, box-shadow 0.2s ease;
  position: relative; background: #000;
}
.phone-mini-notch {
  position: absolute; top: 0; left: 50%; transform: translateX(-50%);
  width: 70px; height: 18px; background: #000;
  border-radius: 0 0 12px 12px; z-index: 10;
}
.phone-mini-screen {
  position: absolute; inset: 0; overflow: hidden; border-radius: 28px;
}
.state-label { font-size: 12px; font-weight: 700; color: #4A4438; text-align: center; letter-spacing: 0.3px; }
.state-badge { font-size: 10px; color: #8A8070; text-align: center; }

/* Fullscreen overlay */
.overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.72);
  display: flex; align-items: center; justify-content: center;
  z-index: 999;
  animation: fade-in 0.18s ease both;
}
.overlay-phone {
  width: 390px; height: 750px;
  border-radius: 44px; overflow: hidden;
  box-shadow: 0 0 0 10px #1a1a1a, 0 40px 80px rgba(0,0,0,0.6);
  position: relative; background: #000; flex-shrink: 0;
  animation: pop-in 0.25s cubic-bezier(0.34,1.26,0.64,1) both;
}
.overlay-notch {
  position: absolute; top: 0; left: 50%; transform: translateX(-50%);
  width: 110px; height: 28px; background: #000;
  border-radius: 0 0 16px 16px; z-index: 10;
}
.overlay-screen { position: absolute; inset: 0; overflow: hidden; border-radius: 44px; }
.close-btn {
  position: fixed; top: 24px; right: 24px; z-index: 1000;
  width: 44px; height: 44px; border-radius: 50%; background: rgba(255,255,255,0.18);
  backdrop-filter: blur(8px); border: 1.5px solid rgba(255,255,255,0.25);
  color: #fff; font-size: 20px; display: flex; align-items: center; justify-content: center;
}
.state-nav {
  position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%);
  display: flex; gap: 12px; z-index: 1000;
}
.nav-btn {
  width: 44px; height: 44px; border-radius: 50%; background: rgba(255,255,255,0.18);
  backdrop-filter: blur(8px); border: 1.5px solid rgba(255,255,255,0.25);
  color: #fff; font-size: 20px; display: flex; align-items: center; justify-content: center;
}

/* Animations */
@keyframes bobble   { 0%,100%{transform:translateY(0) rotate(0)} 50%{transform:translateY(-8px) rotate(-2deg)} }
@keyframes pop-in   { 0%{transform:scale(0.7);opacity:0} 65%{transform:scale(1.04)} 100%{transform:scale(1);opacity:1} }
@keyframes fade-in  { from{opacity:0} to{opacity:1} }
@keyframes slide-up { from{transform:translateY(20px);opacity:0} to{transform:translateY(0);opacity:1} }
@keyframes spin     { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }
@keyframes pulse    { 0%,100%{transform:scale(1)} 50%{transform:scale(1.06)} }
@keyframes shimmer  { 0%{background-position:-200% 0} 100%{background-position:200% 0} }
@keyframes leaf-spin{ from{transform:rotate(0deg)} to{transform:rotate(360deg)} }
@keyframes confetti-fall { 0%{transform:translateY(-10px) rotate(0deg);opacity:1} 100%{transform:translateY(200px) rotate(720deg);opacity:0} }
@keyframes check-draw { from{stroke-dashoffset:80} to{stroke-dashoffset:0} }
@keyframes toast-in { from{transform:translateY(-12px);opacity:0} to{transform:translateY(0);opacity:1} }
@keyframes wiggle   { 0%,100%{transform:rotate(0)} 25%{transform:rotate(-6deg)} 75%{transform:rotate(6deg)} }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel">
const { useState, useEffect, useRef } = React;

// ── SHARED MASCOT ─────────────────────────────────────────────
function Bap({ size=100, mood='happy', color='#FFD36E' }) {
  const dark = {'#FFD36E':'#E8B23F','#A8D5A2':'#7FB983','#B8DEEF':'#88BED4','#FFA48C':'#E2815E','#D9C7F0':'#B39DD1'}[color]||'#E8B23F';
  const eyes = {
    happy:     <><ellipse cx="40" cy="62" rx="6" ry="7" fill="#2D3A2E"/><ellipse cx="38.5" cy="60" rx="2" ry="2.5" fill="#fff"/><ellipse cx="80" cy="62" rx="6" ry="7" fill="#2D3A2E"/><ellipse cx="78.5" cy="60" rx="2" ry="2.5" fill="#fff"/></>,
    celebrate: <><path d="M34 64 Q40 57 46 64" stroke="#2D3A2E" strokeWidth="3" fill="none" strokeLinecap="round"/><path d="M74 64 Q80 57 86 64" stroke="#2D3A2E" strokeWidth="3" fill="none" strokeLinecap="round"/></>,
    sleep:     <><path d="M34 62 Q40 67 46 62" stroke="#2D3A2E" strokeWidth="3" fill="none" strokeLinecap="round"/><path d="M74 62 Q80 67 86 62" stroke="#2D3A2E" strokeWidth="3" fill="none" strokeLinecap="round"/></>,
    sad:       <><ellipse cx="40" cy="63" rx="5" ry="5" fill="#2D3A2E"/><ellipse cx="80" cy="63" rx="5" ry="5" fill="#2D3A2E"/></>,
    wave:      <><ellipse cx="40" cy="62" rx="6" ry="7" fill="#2D3A2E"/><ellipse cx="38.5" cy="60" rx="2" ry="2.5" fill="#fff"/><path d="M74 64 Q80 57 86 64" stroke="#2D3A2E" strokeWidth="3" fill="none" strokeLinecap="round"/></>,
    think:     <><ellipse cx="40" cy="62" rx="5" ry="5" fill="#2D3A2E"/><ellipse cx="80" cy="62" rx="5" ry="5" fill="#2D3A2E"/></>,
    surprised: <><ellipse cx="40" cy="62" rx="7" ry="8" fill="#2D3A2E"/><ellipse cx="38" cy="59" rx="2.5" ry="3" fill="#fff"/><ellipse cx="80" cy="62" rx="7" ry="8" fill="#2D3A2E"/><ellipse cx="78" cy="59" rx="2.5" ry="3" fill="#fff"/></>,
  };
  const mouths = {
    happy:     <path d="M42 82 Q60 96 78 82" stroke="#2D3A2E" strokeWidth="3.5" fill="#C14A2A" strokeLinecap="round" strokeLinejoin="round"/>,
    celebrate: <path d="M36 80 Q60 106 84 80 Q60 96 36 80Z" fill="#C14A2A" stroke="#2D3A2E" strokeWidth="3" strokeLinejoin="round"/>,
    sleep:     <path d="M46 86 Q60 92 74 86" stroke="#2D3A2E" strokeWidth="3" fill="none" strokeLinecap="round"/>,
    sad:       <path d="M44 88 Q60 80 76 88" stroke="#2D3A2E" strokeWidth="3.5" fill="none" strokeLinecap="round"/>,
    wave:      <path d="M42 82 Q60 96 78 82" stroke="#2D3A2E" strokeWidth="3.5" fill="#C14A2A" strokeLinecap="round" strokeLinejoin="round"/>,
    think:     <ellipse cx="60" cy="88" rx="6" ry="4" fill="#2D3A2E"/>,
    surprised: <ellipse cx="60" cy="88" rx="8" ry="9" fill="#C14A2A" stroke="#2D3A2E" strokeWidth="3"/>,
  };
  return (
    <svg viewBox="0 0 120 140" width={size} height={size*140/120} style={{display:'block'}}>
      <ellipse cx="38" cy="18" rx="14" ry="20" fill="#7FB983" transform="rotate(-30 38 18)"/>
      <ellipse cx="38" cy="18" rx="7"  ry="16" fill="#A8D5A2" transform="rotate(-30 38 18)"/>
      <ellipse cx="76" cy="14" rx="16" ry="22" fill="#5FA36A" transform="rotate(25 76 14)"/>
      <ellipse cx="76" cy="14" rx="8"  ry="18" fill="#A8D5A2" transform="rotate(25 76 14)"/>
      <ellipse cx="60" cy="126" rx="38" ry="6" fill="rgba(46,90,58,0.15)"/>
      <path d="M60 28C92 28 100 56 100 82C100 110 82 126 60 126C38 126 20 110 20 82C20 56 28 28 60 28Z" fill={color} stroke="#2D3A2E" strokeWidth="3.5"/>
      <line x1="30" y1="72" x2="90" y2="72" stroke={dark} strokeWidth="2" opacity="0.35"/>
      <line x1="28" y1="82" x2="92" y2="82" stroke={dark} strokeWidth="2" opacity="0.35"/>
      <line x1="30" y1="92" x2="90" y2="92" stroke={dark} strokeWidth="2" opacity="0.35"/>
      <ellipse cx="60" cy="56" rx="28" ry="18" fill="rgba(255,255,255,0.16)"/>
      {eyes[mood] || eyes.happy}
      {mouths[mood] || mouths.happy}
      <ellipse cx="30" cy="72" rx="9" ry="8" fill="rgba(255,120,80,0.22)"/>
      <ellipse cx="90" cy="72" rx="9" ry="8" fill="rgba(255,120,80,0.22)"/>
      {/* Wave arm */}
      {mood === 'wave' && <path d="M100 70 Q118 55 112 40 Q108 50 100 60Z" fill={color} stroke="#2D3A2E" strokeWidth="2.5"/>}
    </svg>
  );
}

// ── CONFETTI ──────────────────────────────────────────────────
function Confetti({ count=20 }) {
  const pieces = useRef(
    Array.from({length:count}, (_,i) => ({
      x: Math.random()*100, delay: Math.random()*1.5,
      dur: 1.8 + Math.random()*1.2,
      color: ['#FFD36E','#A8D5A2','#B8DEEF','#FFA48C','#D9C7F0','#E6779E'][i%6],
      size: 6 + Math.random()*8,
      shape: Math.random() > 0.5 ? 'circle' : 'rect',
    }))
  ).current;
  return (
    <div style={{position:'absolute',inset:0,overflow:'hidden',pointerEvents:'none',zIndex:5}}>
      {pieces.map((p,i) => (
        <div key={i} style={{
          position:'absolute', left:`${p.x}%`, top:-16,
          width:p.size, height:p.size,
          borderRadius: p.shape==='circle' ? '50%' : '3px',
          background: p.color,
          animation:`confetti-fall ${p.dur}s ${p.delay}s ease-in infinite`,
        }}/>
      ))}
    </div>
  );
}

// ── SPINNING LEAF RING (loading) ──────────────────────────────
function LeafRing({ size=180 }) {
  const leaves = Array.from({length:8}, (_,i) => i);
  return (
    <div style={{
      width:size, height:size, position:'relative',
      animation:'leaf-spin 6s linear infinite',
    }}>
      {leaves.map(i => {
        const angle = (i/8)*360;
        const rad = (angle * Math.PI)/180;
        const r = size/2 - 16;
        const x = size/2 + r*Math.cos(rad) - 10;
        const y = size/2 + r*Math.sin(rad) - 10;
        return (
          <div key={i} style={{ position:'absolute', left:x, top:y, transform:`rotate(${angle+90}deg)` }}>
            <svg viewBox="0 0 20 28" width="20" height="28">
              <ellipse cx="10" cy="14" rx="8" ry="12" fill="#7FB983" opacity={0.5 + (i%3)*0.2}/>
            </svg>
          </div>
        );
      })}
    </div>
  );
}

// ── PROGRESS STARS ────────────────────────────────────────────
function Stars({ count=3, size=36 }) {
  return (
    <div style={{display:'flex',gap:6,justifyContent:'center'}}>
      {[0,1,2].map(i => (
        <svg key={i} width={size} height={size} viewBox="0 0 36 36"
          style={{animation:`pop-in 0.4s ${0.1+i*0.12}s both`}}>
          <polygon points="18,3 22,13 33,13 24,20 27,31 18,24 9,31 12,20 3,13 14,13"
            fill={i < count ? '#FFD36E' : '#E8E2D4'}
            stroke={i < count ? '#C79528' : '#C4C0B3'}
            strokeWidth="1.5" strokeLinejoin="round"/>
        </svg>
      ))}
    </div>
  );
}

// ─────────────────────────────────────────────────────────────
// STATE SCREENS
// ─────────────────────────────────────────────────────────────

// 1. LOADING
function StateLoading() {
  const phrases = ['Counting leaves…','Sorting even and odd…','Building big numbers…','Finding hidden 7s…','Lining up 1 to 20…'];
  const [idx, setIdx] = useState(0);
  useEffect(() => {
    const t = setInterval(() => setIdx(i => (i+1) % phrases.length), 1800);
    return () => clearInterval(t);
  }, []);
  return (
    <div style={{
      height:'100%', display:'flex', flexDirection:'column',
      alignItems:'center', justifyContent:'center',
      background:'linear-gradient(170deg,#FFF8EC 0%,#FFEFD3 60%,#F0E8D5 100%)',
      gap:0, position:'relative', overflow:'hidden',
    }}>
      {/* Leaf ring behind mascot */}
      <div style={{position:'absolute',display:'flex',alignItems:'center',justifyContent:'center', inset:0}}>
        <LeafRing size={200}/>
      </div>
      <div style={{animation:'bobble 2.4s ease-in-out infinite', position:'relative', zIndex:2}}>
        <Bap size={130} mood="happy"/>
      </div>
      <div style={{
        marginTop:24, fontSize:20, fontWeight:700, color:'#2D3A2E',
        fontFamily:'Fredoka, ui-rounded, sans-serif', textAlign:'center',
        position:'relative', zIndex:2,
        animation:'fade-in 0.4s ease both', key:idx,
      }}>
        {phrases[idx]}
      </div>
      {/* Dot pulse */}
      <div style={{display:'flex',gap:8,marginTop:16,position:'relative',zIndex:2}}>
        {[0,1,2].map(i => (
          <div key={i} style={{
            width:10, height:10, borderRadius:'50%', background:'#A8D5A2',
            animation:`pulse 1.2s ${i*0.3}s ease-in-out infinite`,
          }}/>
        ))}
      </div>
    </div>
  );
}

// 2. EMPTY STATE — first launch (child)
function StateEmpty() {
  return (
    <div style={{
      height:'100%', display:'flex', flexDirection:'column',
      alignItems:'center', justifyContent:'center',
      background:'linear-gradient(170deg,#FFF8EC,#FFEFD3)',
      padding:'32px 28px', gap:0,
    }}>
      <div style={{animation:'bobble 2.8s ease-in-out infinite'}}>
        <Bap size={130} mood="wave"/>
      </div>
      <div style={{ marginTop:20, fontSize:26, fontWeight:700, color:'#2D3A2E', textAlign:'center', fontFamily:'Fredoka, ui-rounded, sans-serif', lineHeight:1.2 }}>
        Hi! I'm Bắp! 👋
      </div>
      <div style={{ marginTop:8, fontSize:14, color:'#6B7A6C', textAlign:'center', lineHeight:1.6, maxWidth:260 }}>
        Your number adventure starts here. Let's count, build, and play!
      </div>
      <button style={{
        marginTop:28, padding:'16px 36px', borderRadius:28,
        background:'#7FC089', color:'#1F4A28',
        fontFamily:'Fredoka, ui-rounded, sans-serif', fontWeight:700, fontSize:22,
        border:'3px solid #2D3A2E', boxShadow:'0 5px 0 #4D8B58',
        transition:'transform 0.1s',
      }}>
        Start Playing ▶
      </button>
      <div style={{marginTop:14,fontSize:12,color:'#A9B4A8'}}>Lesson 1 · Garden of Numbers</div>
    </div>
  );
}

// 3. NO PROGRESS YET — parent view
function StateNoProgress() {
  return (
    <div style={{
      height:'100%', display:'flex', flexDirection:'column',
      background:'#F5F3ED', fontFamily:'Be Vietnam Pro, sans-serif',
    }}>
      {/* Header */}
      <div style={{ padding:'44px 16px 14px', background:'#fff', borderBottom:'1px solid rgba(46,90,58,0.1)' }}>
        <div style={{ fontSize:10, fontWeight:700, color:'#A9B4A8', letterSpacing:1 }}>PARENT CORNER</div>
        <div style={{ fontSize:17, fontWeight:700, color:'#1F2A1F' }}>Progress Report</div>
      </div>
      <div style={{ flex:1, display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', padding:'24px', gap:16 }}>
        {/* Empty chart illustration */}
        <div style={{
          width:'100%', background:'#fff', borderRadius:20,
          border:'1px solid rgba(46,90,58,0.1)', padding:'20px',
        }}>
          <div style={{ fontSize:13, fontWeight:700, color:'#1F2A1F', marginBottom:14 }}>Weekly Activity</div>
          <div style={{ display:'flex', alignItems:'flex-end', gap:8, height:64, opacity:0.25 }}>
            {[0,0,0,0,0,0,0].map((v,i) => (
              <div key={i} style={{ flex:1, display:'flex', flexDirection:'column', alignItems:'center', gap:4 }}>
                <div style={{ width:'100%', height:4, borderRadius:4, background:'#D8D2C0' }}/>
                <div style={{ fontSize:9, color:'#A9B4A8' }}>{['M','T','W','T','F','S','S'][i]}</div>
              </div>
            ))}
          </div>
        </div>

        {/* Empty message */}
        <div style={{ textAlign:'center', padding:'8px 0' }}>
          <div style={{ fontSize:36, marginBottom:10 }}>📭</div>
          <div style={{ fontSize:17, fontWeight:700, color:'#1F2A1F', marginBottom:6 }}>No activity yet</div>
          <div style={{ fontSize:13, color:'#6B7A6C', lineHeight:1.6 }}>
            Bắp hasn't played today. Progress and accuracy will appear here after the first session.
          </div>
        </div>

        <button style={{
          width:'100%', padding:'14px', borderRadius:16,
          background:'#1F2A1F', color:'#fff',
          fontSize:14, fontWeight:700, border:'none',
        }}>
          Open the app for Bắp →
        </button>
      </div>
    </div>
  );
}

// 4. LOCKED LESSON
function StateLocked() {
  return (
    <div style={{
      height:'100%', display:'flex', flexDirection:'column',
      alignItems:'center', justifyContent:'center',
      background:'linear-gradient(170deg,#FFF8EC,#F0E8D5)',
      padding:'32px 24px', gap:16,
    }}>
      <div style={{animation:'bobble 2.8s ease-in-out infinite'}}>
        <Bap size={100} mood="think"/>
      </div>

      {/* Locked lesson card */}
      <div style={{
        width:'100%', background:'rgba(255,255,255,0.7)',
        backdropFilter:'blur(8px)', borderRadius:24,
        border:'2px solid rgba(46,90,58,0.15)',
        padding:'18px', position:'relative', overflow:'hidden',
      }}>
        {/* Dim overlay */}
        <div style={{ position:'absolute', inset:0, background:'rgba(240,234,220,0.5)', borderRadius:22, zIndex:0 }}/>
        <div style={{ position:'relative', zIndex:1 }}>
          <div style={{ display:'flex', alignItems:'center', gap:12, marginBottom:14 }}>
            {/* Lock icon */}
            <div style={{
              width:52, height:52, borderRadius:16, flexShrink:0,
              background:'#E8E2D4', border:'2px solid rgba(46,90,58,0.15)',
              display:'flex', alignItems:'center', justifyContent:'center', fontSize:26,
            }}>🔒</div>
            <div>
              <div style={{ fontSize:16, fontWeight:700, color:'#A9B4A8', fontFamily:'Fredoka, ui-rounded, sans-serif' }}>
                Even &amp; Odd Island
              </div>
              <div style={{ fontSize:12, color:'#C4C0B3' }}>World 3 · Lesson 1</div>
            </div>
          </div>

          <div style={{ fontSize:13, color:'#6B7A6C', lineHeight:1.5, marginBottom:14 }}>
            Finish <strong style={{color:'#2D3A2E'}}>Number Forest</strong> first to unlock this world!
          </div>

          {/* Progress toward unlock */}
          <div style={{ marginBottom:4, display:'flex', justifyContent:'space-between', fontSize:11, color:'#A9B4A8', fontWeight:600 }}>
            <span>World 2 progress</span><span>14 / 20 lessons</span>
          </div>
          <div style={{ height:8, borderRadius:8, background:'rgba(46,90,58,0.08)', overflow:'hidden' }}>
            <div style={{ height:'100%', width:'70%', borderRadius:8, background:'#FFD36E' }}/>
          </div>
          <div style={{ marginTop:8, fontSize:12, color:'#B87C0E', fontWeight:600 }}>
            🌟 6 more lessons to go!
          </div>
        </div>
      </div>

      <button style={{
        padding:'14px 32px', borderRadius:24,
        background:'#7FC089', color:'#1F4A28',
        fontFamily:'Fredoka, ui-rounded, sans-serif', fontWeight:700, fontSize:18,
        border:'3px solid #2D3A2E', boxShadow:'0 4px 0 #4D8B58',
      }}>
        Keep going in World 2 ▶
      </button>
    </div>
  );
}

// GALLERY REGISTRY
// ─────────────────────────────────────────────────────────────
const STATES = [
  { id:'loading',    label:'Loading',           badge:'Child mode',  Component: StateLoading         },
  { id:'empty',      label:'Empty / First Launch',badge:'Child mode', Component: StateEmpty          },
  { id:'noProgress', label:'No Progress Yet',   badge:'Parent mode', Component: StateNoProgress      },
  { id:'locked',     label:'Locked Lesson',     badge:'Child mode',  Component: StateLocked          },
  { id:'complete',   label:'Lesson Complete',   badge:'Child mode',  Component: StateLessonComplete  },
  { id:'offline',    label:'Offline / Error',   badge:'Child mode',  Component: StateOffline         },
  { id:'retry',      label:'Retry State',       badge:'Child mode',  Component: StateRetry           },
  { id:'saved',      label:'Save Success',      badge:'Parent mode', Component: StateSaveSuccess     },
  { id:'session',    label:'Session Complete',  badge:'Child mode',  Component: StateSessionComplete },
];

// ─────────────────────────────────────────────────────────────
// MINI PHONE FRAME
// ─────────────────────────────────────────────────────────────
function MiniFrame({ children }) {
  return (
    <div className="phone-mini">
      <div className="phone-mini-notch"/>
      <div className="phone-mini-screen" style={{transform:'scale(0.514)', transformOrigin:'top left', width:'194.5%', height:'194.5%'}}>
        {children}
      </div>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────
// FULLSCREEN OVERLAY
// ─────────────────────────────────────────────────────────────
function FullscreenState({ state, onClose, onPrev, onNext }) {
  const { Component, label, badge } = state;
  return (
    <div className="overlay" onClick={onClose}>
      <button className="close-btn" onClick={onClose}>×</button>
      <div style={{ display:'flex', flexDirection:'column', alignItems:'center', gap:12 }} onClick={e => e.stopPropagation()}>
        <div className="overlay-phone">
          <div className="overlay-notch"/>
          <div className="overlay-screen" style={{ paddingTop:28 }}>
            <Component/>
          </div>
        </div>
        <div style={{ textAlign:'center' }}>
          <div style={{ fontSize:15, fontWeight:700, color:'#fff' }}>{label}</div>
          <div style={{ fontSize:12, color:'rgba(255,255,255,0.55)' }}>{badge}</div>
        </div>
      </div>
      <div className="state-nav">
        <button className="nav-btn" onClick={e=>{e.stopPropagation();onPrev();}}>‹</button>
        <button className="nav-btn" onClick={e=>{e.stopPropagation();onNext();}}>›</button>
      </div>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────
// APP
// ─────────────────────────────────────────────────────────────
function App() {
  const [expanded, setExpanded] = useState(null);

  const idx = expanded !== null ? STATES.findIndex(s => s.id === expanded) : -1;
  const cur = idx >= 0 ? STATES[idx] : null;
  const prev = () => setExpanded(STATES[(idx - 1 + STATES.length) % STATES.length].id);
  const next = () => setExpanded(STATES[(idx + 1) % STATES.length].id);

  useEffect(() => {
    function onKey(e) {
      if (expanded === null) return;
      if (e.key === 'ArrowLeft')  prev();
      if (e.key === 'ArrowRight') next();
      if (e.key === 'Escape')     setExpanded(null);
    }
    window.addEventListener('keydown', onKey);
    return () => window.removeEventListener('keydown', onKey);
  }, [expanded, idx]);

  return (
    <div>
      {/* Header */}
      <div className="gallery-header">
        <div>
          <div className="gallery-title">UI States</div>
          <div className="gallery-sub">Bắp Number Adventure · {STATES.length} states · tap to expand</div>
        </div>
        <div style={{ marginLeft:'auto', fontSize:12, color:'#8A8070', fontWeight:500 }}>← → keys to navigate</div>
      </div>

      {/* Grid */}
      <div className="gallery-grid">
        {STATES.map((s, i) => (
          <div key={s.id} className="state-card" onClick={() => setExpanded(s.id)}
            style={{ animationDelay:`${i*0.04}s` }}>
            <MiniFrame>
              <s.Component/>
            </MiniFrame>
            <div style={{paddingTop:2}}>
              <div className="state-label">{i+1}. {s.label}</div>
              <div className="state-badge">{s.badge}</div>
            </div>
          </div>
        ))}
      </div>

      {/* Fullscreen */}
      {cur && (
        <FullscreenState state={cur} onClose={() => setExpanded(null)} onPrev={prev} onNext={next}/>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
