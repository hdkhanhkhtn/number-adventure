// ── SPARKLINE ─────────────────────────────────────────────────
function Sparkline({ data, width=200, height=48, color='#5FB36A' }) {
  const min = Math.min(...data), max = Math.max(...data);
  const range = max - min || 1;
  const pts = data.map((v, i) => {
    const x = (i / (data.length - 1)) * width;
    const y = height - ((v - min) / range) * (height - 6) - 3;
    return `${x},${y}`;
  }).join(' ');
  const area = `M0,${height} L` + data.map((v,i) => {
    const x = (i/(data.length-1))*width;
    const y = height - ((v-min)/range)*(height-6) - 3;
    return `${x},${y}`;
  }).join(' L') + ` L${width},${height} Z`;
  return (
    <svg viewBox={`0 0 ${width} ${height}`} width={width} height={height} style={{overflow:'visible'}}>
      <defs>
        <linearGradient id="sparkGrad" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stopColor={color} stopOpacity="0.2"/>
          <stop offset="100%" stopColor={color} stopOpacity="0"/>
        </linearGradient>
      </defs>
      <path d={area} fill="url(#sparkGrad)"/>
      <polyline points={pts} fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/>
      {/* last dot */}
      <circle cx={(data.length-1)/(data.length-1)*width} cy={height-((data[data.length-1]-min)/range)*(height-6)-3}
        r="4" fill={color} stroke="#fff" strokeWidth="2"/>
    </svg>
  );
}

// ── RADIAL PROGRESS ───────────────────────────────────────────
function Radial({ pct, size=88, stroke=8, color='var(--sage)', label, sublabel }) {
  const r = (size - stroke*2)/2;
  const c = 2*Math.PI*r;
  return (
    <div style={{ position:'relative', width:size, height:size, flexShrink:0 }}>
      <svg width={size} height={size} style={{transform:'rotate(-90deg)',position:'absolute',inset:0}}>
        <circle cx={size/2} cy={size/2} r={r} fill="none" stroke="rgba(46,90,58,0.08)" strokeWidth={stroke}/>
        <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={color}
          strokeWidth={stroke} strokeLinecap="round"
          strokeDasharray={c} strokeDashoffset={c*(1-pct)}
          style={{transition:'stroke-dashoffset 0.9s ease'}}/>
      </svg>
      <div style={{ position:'absolute', inset:0, display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', gap:0 }}>
        <div style={{ fontSize:18, fontWeight:700, color:'var(--ink)', lineHeight:1 }}>{Math.round(pct*100)}%</div>
        {sublabel && <div style={{ fontSize:9, color:'var(--ink-faint)', fontWeight:600, marginTop:2 }}>{sublabel}</div>}
      </div>
    </div>
  );
}

            {/* Header row */}
            <button
              onClick={() => setExpanded(isOpen ? null : s.id)}
              style={{
                width:'100%', padding:'14px 16px', textAlign:'left',
                display:'flex', alignItems:'center', gap:12,
                background: isOpen ? s.paleBg : 'transparent',
                transition:'background 0.2s',
              }}>
              <div style={{ fontSize:22, width:32, textAlign:'center', flexShrink:0 }}>{s.icon}</div>
              <div style={{ flex:1, minWidth:0 }}>
                <div style={{ display:'flex', alignItems:'center', gap:8, flexWrap:'wrap' }}>
                  <div style={{ fontSize:14, fontWeight:700, color:'var(--ink)' }}>{s.label}</div>
                  <TierChip tier={s.tier}/>
                </div>
                <div style={{ marginTop:6, height:6, borderRadius:6, background:'rgba(46,90,58,0.08)', overflow:'hidden', width:'100%' }}>
                  <div style={{ height:'100%', width:`${s.pct*100}%`, borderRadius:6, background:s.color, transition:'width 0.7s ease' }}/>
                </div>
              </div>
              <div style={{ display:'flex', flexDirection:'column', alignItems:'flex-end', gap:4, flexShrink:0 }}>
                <div style={{ fontSize:14, fontWeight:700, color:'var(--ink)' }}>{Math.round(s.pct*100)}%</div>
                <div style={{ fontSize:10, color: s.trend>0 ? 'var(--sage)' : 'var(--ink-faint)', fontWeight:600 }}>
                  {s.trend>0 ? `↑ +${s.trend}%` : '—'}
                </div>
              </div>
            </button>

            {/* Expanded detail */}
            {isOpen && (
              <div style={{ padding:'0 16px 16px', borderTop:`1px solid var(--ol)`, animation:'slide-up 0.2s ease both' }}>
                <div style={{ paddingTop:12, display:'flex', flexDirection:'column', gap:12 }}>
                  <div style={{ fontSize:12, color:'var(--ink-soft)', lineHeight:1.5 }}>{s.sub}</div>

                  {/* Stats row */}
                  <div style={{ display:'grid', gridTemplateColumns:'repeat(3,1fr)', gap:8 }}>
                    <StatBox label="Sessions" value={s.sessions} color="var(--ink)"/>
                    <StatBox label="Mastery" value={`${Math.round(s.pct*100)}%`} color={s.tier==='mastered'?'#2F6A3C':s.tier==='practicing'?'#7A4E0E':'#1F4A61'}/>
                    <StatBox label="Trend" value={s.trend>0?`+${s.trend}%`:s.trend===0?'Stable':'↓'} color={s.trend>0?'var(--sage)':'var(--ink-faint)'}/>
                  </div>

                  {/* Confidence dots */}
                  <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between' }}>
                    <div style={{ fontSize:12, color:'var(--ink-soft)', fontWeight:600 }}>Confidence level</div>
                    <ConfidenceDots pct={s.pct}/>
                  </div>

                  {/* Suggested game */}
                  {s.tier !== 'mastered' && (
                    <div style={{
                      display:'flex', alignItems:'center', gap:10, padding:'10px 12px',
                      background:s.paleBg, borderRadius:14, border:`1px solid ${s.color}`,
                    }}>
                      <div style={{ fontSize:18 }}>🎮</div>
                      <div style={{ flex:1 }}>
                        <div style={{ fontSize:12, fontWeight:700, color:'var(--ink)' }}>Recommended game</div>
                        <div style={{ fontSize:11, color:'var(--ink-soft)' }}>{s.game}</div>
                      </div>
                      <div style={{
                        fontSize:11, fontWeight:700, color:'#fff',
                        background:'var(--ink)', padding:'5px 12px', borderRadius:999,
                      }}>Play ▶</div>
                    </div>
                  )}
                  {s.tier === 'mastered' && (
                    <div style={{
                      padding:'10px 12px', borderRadius:14,
                      background:'var(--sage-pale)', border:'1px solid var(--sage-mid)',
                      fontSize:12, color:'#2F6A3C', fontWeight:600,
                      display:'flex', alignItems:'center', gap:8,
                    }}>
                      <span>✅</span> This skill is mastered! Keep it warm with occasional play.
                    </div>
                  )}
                </div>
              </div>
            )}
          </div>
        );
      })}

      <div style={{ fontSize:12, color:'var(--ink-faint)', textAlign:'center', padding:'4px 0' }}>
        Tap any skill to see detail and recommended games
      </div>
    </div>
  );
}

function StatBox({ label, value, color }) {
  return (
    <div style={{ background:'var(--surface)', borderRadius:12, padding:'10px', textAlign:'center', border:'1px solid var(--ol)' }}>
      <div style={{ fontSize:16, fontWeight:700, color }}>{value}</div>
      <div style={{ fontSize:10, color:'var(--ink-faint)', fontWeight:600, marginTop:2 }}>{label.toUpperCase()}</div>
    </div>
  );
}

// ════════════════════════════════════════════════════════════
// TAB 3 — SESSIONS
// ════════════════════════════════════════════════════════════
const GAME_ICONS = {
  'Hear & Tap':'👂', 'Number Order':'🔢', 'Build the Number':'🧱',
  'Even/Odd House':'🏠', 'Add & Take Away':'➕',
};
const GAME_SKILL_COLORS = {
  'recog':'var(--sage)', 'listen':'var(--sage)', 'count':'var(--sky)',
  'tens':'var(--sun)', 'evenodd':'var(--sky)', 'add':'var(--lav)', 'sub':'var(--lav)',
};

function SessionsTab() {
  const [filter, setFilter] = useState('week');
  const filters = [
    { id:'week',  label:'This Week' },
    { id:'month', label:'Last 30 Days' },
    { id:'all',   label:'All Time' },
  ];
  const visible = filter === 'week'
    ? SESSIONS_ALL.slice(0,9)
    : filter === 'month' ? SESSIONS_ALL : SESSIONS_ALL;

  // Group by date label
  const grouped = visible.reduce((acc, s) => {
    acc[s.date] = acc[s.date] || [];
    acc[s.date].push(s);
    return acc;
  }, {});

  return (
    <div className="fade-in" style={{ display:'flex', flexDirection:'column', gap:16 }}>

      {/* Filter chips */}
      <div style={{ display:'flex', gap:6 }}>
        {filters.map(f => (
          <button key={f.id} onClick={()=>setFilter(f.id)} style={{
            padding:'7px 14px', borderRadius:999, fontSize:12, fontWeight:600,
            background: filter===f.id ? 'var(--ink)' : 'var(--card)',
            color: filter===f.id ? '#fff' : 'var(--ink-soft)',
            border: filter===f.id ? 'none' : '1px solid var(--ol)',
            transition:'all 0.15s',
          }}>{f.label}</button>
        ))}
      </div>

      {/* Summary strip */}
      <div style={{ display:'grid', gridTemplateColumns:'repeat(3,1fr)', gap:8 }}>
        <StatBox label="Sessions"   value={visible.length}                      color="var(--ink)"/>
        <StatBox label="Total Time" value={`${visible.reduce((a,s)=>a+s.mins,0)}m`} color="var(--sky-ink)"/>
        <StatBox label="Avg Acc."   value={`${Math.round(visible.reduce((a,s)=>a+s.acc,0)/visible.length)}%`} color="var(--sage)"/>
      </div>

      {/* Timeline */}
      {Object.entries(grouped).map(([date, sessions]) => (
        <div key={date}>
          <div style={{ fontSize:11, fontWeight:700, color:'var(--ink-faint)', letterSpacing:0.8, textTransform:'uppercase', marginBottom:8, paddingLeft:4 }}>{date}</div>
          <Card>
            {sessions.map((s, i) => (
              <div key={s.id}>
                <div style={{ padding:'12px 14px', display:'flex', alignItems:'center', gap:12 }}>
                  {/* Icon */}
                  <div style={{
                    width:42, height:42, borderRadius:14, flexShrink:0,
                    background:'var(--surface)', border:'1px solid var(--ol)',
                    display:'flex', alignItems:'center', justifyContent:'center', fontSize:20,
                  }}>{GAME_ICONS[s.game]||'🎮'}</div>

                  {/* Info */}
                  <div style={{ flex:1, minWidth:0 }}>
                    <div style={{ fontSize:13, fontWeight:600, color:'var(--ink)', whiteSpace:'nowrap', overflow:'hidden', textOverflow:'ellipsis' }}>{s.game}</div>
                    <div style={{ display:'flex', gap:6, marginTop:4, alignItems:'center', flexWrap:'wrap' }}>
                      <span style={{ fontSize:11, color:'var(--ink-faint)' }}>{s.time}</span>
                      <span style={{ fontSize:11, color:'var(--ink-faint)' }}>·</span>
                      <span style={{ fontSize:11, color:'var(--ink-faint)' }}>{s.mins} min</span>
                      {s.skills.map(sk => (
                        <div key={sk} style={{
                          fontSize:9, fontWeight:700, letterSpacing:0.4,
                          padding:'1px 6px', borderRadius:999,
                          background:'var(--surface)', color:'var(--ink-soft)',
                          border:'1px solid var(--ol)',
                        }}>{SKILLS.find(x=>x.id===sk)?.label.split(' ')[0]}</div>
                      ))}
                    </div>
                  </div>

                  {/* Score */}
                  <div style={{ textAlign:'right', flexShrink:0 }}>
                    <div style={{ fontSize:14, fontWeight:700, color: s.acc>=80?'#2F6A3C':s.acc>=60?'#B87C0E':'#C14A2A' }}>{s.acc}%</div>
                    <div style={{ fontSize:11, color:'#B87C0E', fontWeight:600 }}>{s.stars} ⭐</div>
                  </div>
                </div>
                {i < sessions.length - 1 && <Divider/>}
              </div>
            ))}
          </Card>
        </div>
      ))}
    </div>
  );
}

// ════════════════════════════════════════════════════════════
// TAB 4 — MILESTONES
// ════════════════════════════════════════════════════════════
function MilestonesTab() {
  const earned   = MILESTONES.filter(m => m.earned);
  const upcoming = MILESTONES.filter(m => !m.earned);

  return (
    <div className="fade-in" style={{ display:'flex', flexDirection:'column', gap:20 }}>

      {/* Earned */}
      <div>
        <Sec>Earned · {earned.length} badges</Sec>
        <div style={{ display:'flex', flexDirection:'column', gap:10 }}>
          {earned.map((m, i) => (
            <div key={m.id} style={{
              display:'flex', alignItems:'center', gap:12,
              background:'var(--card)', borderRadius:18, padding:'14px',
              border:'1px solid var(--ol)',
              animation:`pop-in 0.35s ${i*0.06}s both`,
            }}>
              <div style={{
                width:52, height:52, borderRadius:16, flexShrink:0,
                background: m.color, border:`2px solid rgba(46,90,58,0.15)`,
                boxShadow:`0 3px 0 ${m.shadow}`,
                display:'flex', alignItems:'center', justifyContent:'center', fontSize:26,
              }}>{m.icon}</div>
              <div style={{ flex:1 }}>
                <div style={{ fontSize:14, fontWeight:700, color:'var(--ink)' }}>{m.title}</div>
                <div style={{ fontSize:12, color:'var(--ink-soft)', marginTop:2 }}>{m.sub}</div>
              </div>
              <div style={{ fontSize:11, color:'var(--ink-faint)', fontWeight:600, flexShrink:0, textAlign:'right' }}>{m.date}</div>
            </div>
          ))}
        </div>
      </div>

      {/* Upcoming */}
      <div>
        <Sec>Upcoming · Almost there</Sec>
        <div style={{ display:'flex', flexDirection:'column', gap:10 }}>
          {upcoming.map(m => (
            <div key={m.id} style={{
              display:'flex', alignItems:'center', gap:12,
              background:'var(--card)', borderRadius:18, padding:'14px',
              border:'1px solid var(--ol)',
            }}>
              <div style={{
                width:52, height:52, borderRadius:16, flexShrink:0,
                background:'#F0EADC', border:`2px solid rgba(46,90,58,0.10)`,
                display:'flex', alignItems:'center', justifyContent:'center', fontSize:26,
                filter:'grayscale(0.6)', opacity:0.7,
              }}>{m.icon}</div>
              <div style={{ flex:1 }}>
                <div style={{ fontSize:14, fontWeight:700, color:'var(--ink)' }}>{m.title}</div>
                <div style={{ fontSize:12, color:'var(--ink-soft)', marginTop:2, marginBottom:6 }}>{m.sub}</div>
                {m.pct !== undefined && (
                  <div>
                    <div style={{ height:6, borderRadius:6, background:'rgba(46,90,58,0.08)', overflow:'hidden' }}>
                      <div style={{ height:'100%', width:`${(m.pct/m.goal)*100}%`, borderRadius:6, background:'#C4C0B3', transition:'width 0.7s ease' }}/>
                    </div>
                    <div style={{ fontSize:10, color:'var(--ink-faint)', marginTop:3 }}>
                      {Math.round(m.pct*100)}% of {Math.round(m.goal*100)}% needed
                    </div>
                  </div>
                )}
              </div>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

// ════════════════════════════════════════════════════════════
// ROOT
// ════════════════════════════════════════════════════════════
function App() {
  const [tweaks, setTweaks] = useState(TWEAK_DEFAULTS);
  const [tweaksOpen, setTweaksOpen] = useState(false);
  const [tab, setTab] = useState('overview');

  useEffect(() => {
    function onMsg(e) {
      if (e.data?.type === '__activate_edit_mode')   setTweaksOpen(true);
      if (e.data?.type === '__deactivate_edit_mode') setTweaksOpen(false);
    }
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  useEffect(() => {
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits: tweaks }, '*');
  }, [tweaks]);

  const TABS = [
    { id:'overview',   label:'Overview' },
    { id:'skills',     label:'Skills'   },
    { id:'sessions',   label:'Sessions' },
    { id:'milestones', label:'Milestones' },
  ];

  return (
    <>
    <PhoneShell>
      <div style={{ height:'100%', display:'flex', flexDirection:'column', background:'var(--surface)' }}>

        {/* Header */}
        <div style={{
          padding:'52px 18px 0', background:'var(--card)',
          borderBottom:'1px solid var(--ol)', flexShrink:0,
        }}>
          <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:14 }}>
            <button style={{ fontSize:13, fontWeight:600, color:'var(--ink-soft)', display:'flex', alignItems:'center', gap:4 }}>
              <span style={{fontSize:18,lineHeight:1}}>‹</span> Dashboard
            </button>
            <div style={{ textAlign:'center' }}>
              <div style={{ fontSize:10, fontWeight:700, color:'var(--ink-faint)', letterSpacing:1 }}>PARENT CORNER</div>
              <div style={{ fontSize:17, fontWeight:700, color:'var(--ink)' }}>{tweaks.childName}'s Progress</div>
            </div>
            <div style={{ width:60 }}/>
          </div>

          {/* Tab bar */}
          <div style={{ display:'flex', overflowX:'auto', scrollbarWidth:'none', gap:0 }}>
            {TABS.map(t => (
              <button key={t.id} onClick={() => setTab(t.id)} style={{
                flex:'0 0 auto', padding:'10px 14px',
                fontSize:13, fontWeight:600,
                color: tab===t.id ? 'var(--ink)' : 'var(--ink-faint)',
                borderBottom: tab===t.id ? '2.5px solid var(--ink)' : '2.5px solid transparent',
                transition:'all 0.15s', whiteSpace:'nowrap',
              }}>{t.label}</button>
            ))}
          </div>
        </div>

        {/* Scrollable content */}
        <div className="scroll" style={{ flex:1, padding:'18px 16px 36px' }}>
          {tab === 'overview'   && <OverviewTab name={tweaks.childName}/>}
          {tab === 'skills'     && <SkillsTab/>}
          {tab === 'sessions'   && <SessionsTab/>}
          {tab === 'milestones' && <MilestonesTab/>}
        </div>
      </div>
    </PhoneShell>

    {/* Tweaks */}
    <div id="tweaks-panel" className={tweaksOpen ? 'open' : ''}>
      <h3>TWEAKS</h3>
      <div className="tweak-row">
        <label>Language</label>
        <select className="tweak-select" value={tweaks.lang}
          onChange={e=>setTweaks(t=>({...t,lang:e.target.value}))}>
          <option value="en">English</option>
          <option value="vi">Tiếng Việt</option>
        </select>
      </div>
      <div className="tweak-row">
        <label>Child name</label>
        <input value={tweaks.childName} onChange={e=>setTweaks(t=>({...t,childName:e.target.value}))}
          style={{width:80,padding:'4px 8px',borderRadius:8,border:'1.5px solid rgba(0,0,0,0.1)',fontFamily:'inherit',fontSize:12}}/>
      </div>
    </div>
    </>
  );
}

function PhoneShell({ children }) {
  return (
    <div style={{
      width:390, minHeight:844, borderRadius:50, overflow:'hidden',
      boxShadow:'0 0 0 10px #1a1a1a, 0 40px 80px rgba(0,0,0,0.45)',
      position:'relative', background:'#000',
    }}>
      <div style={{ position:'absolute', top:0, left:'50%', transform:'translateX(-50%)', width:120, height:34, background:'#000', borderRadius:'0 0 20px 20px', zIndex:100 }}/>
      <div style={{ position:'relative', overflow:'hidden', borderRadius:50 }}>
        {children}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
