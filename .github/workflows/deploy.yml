name: Deploy to VPS

# Trigger: every PR merge into main (i.e. push to main)
on:
  push:
    branches:
      - main

# Only one deploy runs at a time; new pushes cancel the in-progress one
concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  # ────────────────────────────────────────────────────────────
  # Job 1: Quality gate (lint + type-check + tests)
  # Must pass before deploy is allowed
  # ────────────────────────────────────────────────────────────
  quality:
    name: Quality Gate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci --frozen-lockfile

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run type-check

      - name: Run tests
        run: npm test -- --watchAll=false --passWithNoTests
        env:
          # Use in-memory/mock DB for tests — no real DB needed in CI
          DATABASE_URL: postgresql://test:test@localhost:5432/test

  # ────────────────────────────────────────────────────────────
  # Job 2: Deploy to VPS via SSH
  # Only runs if quality gate passes
  # ────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: quality
    environment: production   # enables manual approval gate (optional)

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.VPS_SSH_KEY }}

      - name: Add VPS to known_hosts
        run: |
          ssh-keyscan -p ${{ secrets.VPS_PORT || 22 }} \
            ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy via SSH
        run: |
          ssh -p ${{ secrets.VPS_PORT || 22 }} \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} \
            "APP_DIR=${{ secrets.VPS_APP_DIR }} bash ${{ secrets.VPS_APP_DIR }}/scripts/deploy.sh"

      - name: Notify on success
        if: success()
        run: |
          echo "✅ Deploy successful — commit ${{ github.sha }} is live."
          echo "  Branch: ${{ github.ref_name }}"
          echo "  Actor:  ${{ github.actor }}"

      - name: Notify on failure
        if: failure()
        run: |
          echo "❌ Deploy FAILED for commit ${{ github.sha }}"
          echo "  Check logs: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
